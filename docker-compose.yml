version: '3.8'

services:
  # API Gateway
  api_gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=api_gateway
      - PORT=8000
      - AUTH_SERVICE_URL=http://auth_service:8001
      - QA_SERVICE_URL=http://qa_service:8002
    depends_on:
      - auth_service
      - qa_service
    networks:
      - qa_network
    restart: unless-stopped

  # Authentication Service
  auth_service:
    build: .
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=auth_service
      - PORT=8001
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - auth_data:/data/auth
    networks:
      - qa_network
    restart: unless-stopped

  # QA Core Service
  qa_service:
    build: .
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=qa_service
      - PORT=8002
      - VECTOR_STORE_URL=http://vector_store_service:8004
      - BM25_CACHE_URL=http://bm25_cache_service:8005
      - LLM_SERVICE_URL=http://llm_service:8008
    depends_on:
      - vector_store_service
      - bm25_cache_service
      - llm_service
    networks:
      - qa_network
    restart: unless-stopped

  # Vector Store Service
  vector_store_service:
    build: .
    ports:
      - "8004:8004"
    environment:
      - SERVICE_NAME=vector_store_service
      - PORT=8004
      - VECTOR_DB_PROVIDER=milvus
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - COLLECTION_NAME=qa_vectors
    depends_on:
      - milvus-standalone
    networks:
      - qa_network
    restart: unless-stopped

  # BM25 Cache Service
  bm25_cache_service:
    build: .
    ports:
      - "8005:8005"
    environment:
      - SERVICE_NAME=bm25_cache_service
      - PORT=8005
      - CACHE_TTL_SECONDS=3600
      - CACHE_MAX_SIZE=1000
    volumes:
      - cache_data:/data/cache
    networks:
      - qa_network
    restart: unless-stopped

  # Document Processing Service
  document_processor_service:
    build: .
    ports:
      - "8006:8006"
    environment:
      - SERVICE_NAME=document_processor_service
      - PORT=8006
      - MAX_FILE_SIZE_MB=50
      - STORAGE_SERVICE_URL=http://storage_service:8007
    depends_on:
      - storage_service
    networks:
      - qa_network
    restart: unless-stopped

  # Storage Service
  storage_service:
    build: .
    ports:
      - "8007:8007"
    environment:
      - SERVICE_NAME=storage_service
      - PORT=8007
      - STORAGE_BACKEND=local
      - STORAGE_PATH=/data/documents
    volumes:
      - document_storage:/data/documents
    networks:
      - qa_network
    restart: unless-stopped

  # LLM Service
  llm_service:
    build: .
    ports:
      - "8008:8008"
    environment:
      - SERVICE_NAME=llm_service
      - PORT=8008
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama2
      - LLM_BASE_URL=http://ollama:11434/api
    networks:
      - qa_network
    restart: unless-stopped

  # Ollama LLM Server (local LLM alternative)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - qa_network
    restart: unless-stopped
    command: ["--host", "0.0.0.0"]

  # Redis for distributed caching and rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qa_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - qa_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch for logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - qa_network
    restart: unless-stopped

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - qa_network
    restart: unless-stopped

  # Milvus vector database for enterprise-scale vector storage
  milvus-standalone:
    image: milvusdb/milvus:v2.3.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - no-new-privileges:true
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - qa_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Etcd for Milvus metadata
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd-data
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 -data-dir /etcd-data/default.etcd
    networks:
      - qa_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for Milvus storage
  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/minio-data
    command: minio server /minio-data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - qa_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  qa_network:
    driver: bridge

volumes:
  document_storage:
  cache_data:
  auth_data:
  redis_data:
  es_data:
  milvus_data:
  etcd_data:
  minio_data: